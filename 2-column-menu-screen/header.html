<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hnina's Seafood — Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-panel: #16213e;
      --accent: #e94560;
      --accent-gold: #f5a623;
      --text: #ffffff;
      --text-muted: #b0b8c8;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Open Sans', Arial, sans-serif;
      background: var(--bg-panel);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .top-header {
      width: 100vw;
      height: 100vh;
      border-bottom: 3px solid var(--accent);
      display: flex;
      align-items: center;
      padding: 0 40px;
      gap: 24px;
      contain: layout style;
    }

    .header-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--accent);
      flex-shrink: 0;
    }

    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 42px;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 3px;
    }

    .header-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-left: 8px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .header-phone {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 22px;
      color: var(--accent-gold);
      letter-spacing: 1px;
    }

    .header-hours {
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.4;
    }

    .header-hours strong { color: var(--text); }
  </style>
</head>
<body>
  <header class="top-header">
    <div class="header-logo">
      <img src="media/logo/logo-1.jpg" alt="Hnina's Seafood" width="64" height="64">
    </div>
    <div>
      <div class="header-title">Hnina's Seafood</div>
      <div class="header-subtitle">Fresh Seafood &bull; Ocoee, FL</div>
    </div>
    <div class="header-right">
      <div class="header-hours">
        <strong>Mon-Sat</strong> 11AM-8PM<br>
        <strong>Sunday</strong> 12PM-5PM
      </div>
      <div class="header-phone">(407) 440-2822</div>
    </div>
  </header>
</body>
</html>
