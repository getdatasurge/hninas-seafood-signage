<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hnina's Signage{% endblock %}</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-input: #16213e;
      --accent: #e94560;
      --accent-gold: #f5a623;
      --text: #ffffff;
      --text-muted: #8892a4;
      --border: rgba(255,255,255,0.08);
      --success: #2ecc71;
      --error: #e74c3c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar nav */
    .sidebar {
      width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-brand h2 {
      font-size: 16px;
      color: var(--accent);
      font-weight: 700;
    }

    .sidebar-brand small {
      font-size: 11px;
      color: var(--text-muted);
    }

    .nav-item {
      display: block;
      padding: 10px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .nav-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(233,69,96,0.05);
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 32px;
      max-width: 960px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent-gold);
    }

    /* Forms */
    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="time"],
    input[type="file"],
    select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); }
    .btn-gold { background: var(--accent-gold); color: #000; }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--error); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-running {
      background: rgba(46,204,113,0.15);
      color: var(--success);
    }

    .badge-stopped {
      background: rgba(231,76,60,0.15);
      color: var(--error);
    }

    /* Flash messages */
    .flash {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .flash-success {
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.3);
      color: var(--success);
    }

    .flash-error {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: var(--error);
    }

    /* Grid helpers */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); }
    .info-value { font-weight: 600; }

    /* Radio cards */
    .radio-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .radio-card {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-card:hover { border-color: rgba(233,69,96,0.3); }

    .radio-card input { display: none; }
    .radio-card input:checked + .radio-card-content {
      /* handled by parent border */
    }

    .radio-card:has(input:checked) {
      border-color: var(--accent);
      background: rgba(233,69,96,0.05);
    }

    .radio-card-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .radio-card-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .mt-2 { margin-top: 16px; }
    .mb-1 { margin-bottom: 8px; }
    .gap-sm { gap: 8px; display: flex; }

    /* File list */
    .file-list {
      font-size: 13px;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .file-item:last-child { border-bottom: none; }
    .file-name { color: var(--text); font-family: monospace; }
    .file-size { color: var(--text-muted); }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--bg-input);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid var(--border);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-muted);
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-brand">
        <h2>Hnina's Signage</h2>
        <small>Management Panel</small>
      </div>
      <a href="/" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
      <a href="/display" class="nav-item {% if request.endpoint == 'display_settings' %}active{% endif %}">Display Settings</a>
      <a href="/files" class="nav-item {% if request.endpoint == 'file_manager' %}active{% endif %}">File Manager</a>
    </nav>
    <main class="main">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
